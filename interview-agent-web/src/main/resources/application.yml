server:
  port: 8180
  servlet:
    context-path: /

spring:
  application:
    name: interview-agent

  # ==================== 数据源配置 ====================
  datasource:
    url: jdbc:postgresql://localhost:5600/interview_agent
    username: interview_agent
    password: interview_agent_2026
    driver-class-name: org.postgresql.Driver

  # ==================== Spring AI 配置 ====================
  ai:
    # Ollama 配置
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:1.7b
          # model: qwen3.5:4b
          temperature: 0.5
          top-p: 0.9
          num-ctx: 4096
      embedding:
        options:
          model: bge-m3

    # PGVector 向量存储配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== 应用自定义配置 ====================
app:
  upload:
    dir: ${user.dir}/uploads

  # ==================== Reranker 配置 ====================
  # HuggingFace TEI (Text Embeddings Inference) Reranker 服务
  # 面试知识点：Reranker 是 RAG 两阶段检索架构的"精排"阶段
  # - 第一阶段（召回）：向量检索 Top-K（快但粗，用 Embedding 近似匹配）
  # - 第二阶段（精排）：Cross-Encoder 对 Top-K 逐一打分重排序（慢但准）
  reranker:
    enabled: true
    # TEI Reranker 服务地址（对应 docker-compose 中 tei-reranker 容器）
    url: http://localhost:8081
    # 向量检索阶段召回的候选文档数（送入 Reranker 的输入量）
    # 候选集太小可能漏掉相关文档，太大则 Rerank 延迟线性增加
    # 业界推荐：Top-20 ~ Top-50
    candidate-count: 20
    # Rerank 后保留的最终文档数（送入 LLM 的上下文量）
    # 业界推荐：Top-5 ~ Top-10
    top-k: 5
    # Rerank 分数阈值（0~1），低于此值的文档即使排序靠前也丢弃
    # Cross-Encoder 输出的分数范围取决于模型，bge-reranker-v2-m3 通常 0~1
    score-threshold: 0.0
    # 单次 Rerank 请求超时（毫秒）
    timeout-ms: 60000

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  # 逻辑删除仅在 @TableLogic 注解的实体字段上生效，不全局配置
  # 避免影响没有 status 字段的表（chat_session、chat_message 等）

# ==================== Knife4j 接口文档配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 日志配置 ====================
logging:
  level:
    com.interview.agent: DEBUG
    org.springframework.ai.ollama: WARN
    org.springframework.ai.chat.client: WARN
    org.springframework.ai.vectorstore: WARN
