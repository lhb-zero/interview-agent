server:
  port: 8180
  servlet:
    context-path: /

spring:
  application:
    name: interview-agent

  # ==================== 数据源配置 ====================
  datasource:
    url: jdbc:postgresql://localhost:5600/interview_agent
    username: interview_agent
    password: interview_agent_2026
    driver-class-name: org.postgresql.Driver

  # ==================== Spring AI 配置 ====================
  ai:
    # Ollama 配置
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:1.7b
          # model: qwen3.5:4b
          temperature: 0.5
          top-p: 0.9
          num-ctx: 4096
      embedding:
        options:
          model: bge-m3

    # PGVector 向量存储配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== 应用自定义配置 ====================
app:
  upload:
    dir: ${user.dir}/uploads

  # ==================== Reranker 配置 ====================
  # HuggingFace TEI (Text Embeddings Inference) Reranker 服务
  # 面试知识点：Reranker 是 RAG 两阶段检索架构的"精排"阶段
  # - 第一阶段（召回）：向量检索 Top-K（快但粗，用 Embedding 近似匹配）
  # - 第二阶段（精排）：Cross-Encoder 对 Top-K 逐一打分重排序（慢但准）
  reranker:
    enabled: true
    # TEI Reranker 服务地址（对应 docker-compose 中 tei-reranker 容器）
    url: http://localhost:8081
    # 向量检索阶段召回的候选文档数（送入 Reranker 的输入量）
    # 候选集太小可能漏掉相关文档，太大则 Rerank 延迟线性增加
    # 业界推荐：Top-20 ~ Top-50
    candidate-count: 20
    # Rerank 后保留的最终文档数（送入 LLM 的上下文量）
    # 业界推荐：Top-5 ~ Top-10
    top-k: 5
    # Rerank 分数阈值（0~1），低于此值的文档即使排序靠前也丢弃
    # Cross-Encoder 输出的分数范围取决于模型，bge-reranker-v2-m3 通常 0~1
    score-threshold: 0.0
    # 单次 Rerank 请求超时（毫秒）
    timeout-ms: 1200000

  # ==================== 混合检索配置 ====================
  # 混合检索 = 向量检索(Dense) + 关键词检索(Sparse) → RRF 融合排序
  # 原理：
  # - 向量检索擅长语义匹配（"线程池" ↔ "Thread Pool"）
  # - 关键词检索擅长精确匹配（"ThreadPoolExecutor" 完全一致）
  # - RRF（Reciprocal Rank Fusion）将两路结果按排名融合，兼顾语义和精确
  # 适用场景：专有名词（类名/方法名）检索命中率大幅提升
  hybrid-search:
    # 是否启用混合检索（关闭后仅走向量检索）
    enabled: true
    # 向量检索权重（百分比），关键词检索权重 = 100 - vectorWeight
    vector-weight: 40
    # 关键词检索权重
    keyword-weight: 60
    # 混合检索总候选数（两路各召回此数量的结果后再融合）
    top-k: 20
    # RRF 融合公式的分母参数 k（业界经验值 60）
    # RRF_score = weight * (1 / (k + rank))
    rrf-k: 60.0
    # 是否启用关键词检索
    keyword-search-enabled: true
    # 关键词匹配模式：contains（任一关键词匹配）/ all（全部关键词匹配）
    keyword-match-mode: contains

  # ==================== 查询改写配置 (Phase 3) ====================
  # 查询改写 = Query Rewriting，解决用户提问质量差的问题
  # 原理：用户原始问题 → LLM 改写为更适合检索的形式 → 用改写后的 query 检索
  # 效果示例：
  # - "怎么解决死锁？" → "Java多线程死锁的原因、检测方法和避免策略"
  # - "线程池是啥" → "Java线程池ThreadPoolExecutor的原理、参数配置和使用方法"
  # 触发条件：口语化词汇 / 包含指代词（问题过短默认不触发，1.7b模型改写质量不稳定）
  # 业界方案参考：Dify rewrite-angular / RAGFlow 意图识别 / LlamaIndex HyDE
  query-rewrite:
    # 是否启用查询改写（关闭后所有问题直接检索）
    enabled: true
    # 问题过短阈值（低于此字数认为需要改写展开）
    # 注意：1.7b小模型改写质量不稳定，过短判断会误伤清晰问题，建议设为较大值
    min-query-length: 10
    # 单次改写超时（毫秒）
    timeout-ms: 30000
    # 是否在问题过短时触发改写（小模型建议关闭，避免误改）
    need-rewrite-when-short: true
    # 是否在包含口语化词汇时触发改写（啥/怎么/怎样/咋/咋办/啥意思等）
    need-rewrite-when-colloquial: true
    # 是否在包含指代词时触发改写（它/这个/那个/上面/前文等）
    need-rewrite-when-has-pronoun: true

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  # 逻辑删除仅在 @TableLogic 注解的实体字段上生效，不全局配置
  # 避免影响没有 status 字段的表（chat_session、chat_message 等）

# ==================== Knife4j 接口文档配置 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 日志配置 ====================
logging:
  level:
    com.interview.agent: DEBUG
    org.springframework.ai.ollama: WARN
    org.springframework.ai.chat.client: WARN
    org.springframework.ai.vectorstore: WARN
